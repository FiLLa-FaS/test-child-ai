# Статический экспорт Next.js → GitHub Pages (ветка master).
# В настройках репозитория: Settings → Pages → Build: GitHub Actions.
#
# По умолчанию сайт: https://<user>.github.io/<repo>/ — нужен basePath = /repo.
# Для корня user.github.io (репозиторий user.github.io) задайте переменную репозитория
# NEXT_PUBLIC_BASE_PATH пустой и замените env ниже на: NEXT_PUBLIC_BASE_PATH: ""

name: Deploy to GitHub Pages

on:
  push:
    branches: ["master"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Compute Pages base path
        id: pages_base
        shell: bash
        run: |
          NAME="${{ github.event.repository.name }}"
          OWNER="${{ github.repository_owner }}"
          if [ "$NAME" = "${OWNER}.github.io" ]; then
            echo "path=" >> "$GITHUB_OUTPUT"
          else
            echo "path=/$NAME" >> "$GITHUB_OUTPUT"
          fi

      - name: Build static export
        env:
          NEXT_PUBLIC_BASE_PATH: ${{ steps.pages_base.outputs.path }}
        run: npm run build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: out

  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
